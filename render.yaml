services:
  # FastAPI Backend Service
  - type: web
    name: staybook-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: TICKETMASTER_API_KEY
        sync: false # You will enter your Ticketmaster API Key in the Render UI
      - key: ALLOWED_ORIGINS
        value: "*" # Change this to your frontend URL after deployment to secure the CORS origins
      - key: CACHE_TTL_SECONDS
        value: "120"
      - key: CACHE_MAX_SIZE
        value: "1000"
      - key: RATE_LIMIT_PER_MINUTE
        value: "100"

  # Next.js Frontend Service
  - type: web
    name: staybook-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # Enter your deployed backend URL here (e.g. https://staybook-backend.onrender.com)
